version: '3.8'

services:
  expense-bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: expense-bot
    restart: unless-stopped
    
    # Environment variables
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - PYTHONUNBUFFERED=1
    
    # Volume for persistent SQLite database
    volumes:
      - expense-data:/app/data
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volume for SQLite database persistence
volumes:
  expense-data:
    driver: local
