# Telegram Expense Bot 配置文件
# 请复制此文件为 config.yaml 并填入实际值

# Bot 配置
bot:
  # 从 @BotFather 获取的 Telegram Bot Token
  token: "YOUR_BOT_TOKEN_HERE"
  # Bot 名称（可选）
  name: "expense_bot"

# 数据库配置
database:
  # SQLite 数据库路径（会自动创建）
  path: "data/expenses.db"

# 货币设置
currency:
  # 显示的货币符号
  symbol: "£"
  # 货币名称
  name: "GBP"

# 设置
settings:
  # 历史记录显示数量上限
  max_history: 50
  # 默认时区
  timezone: "Europe/London"

# 允许的分类（用户只能使用这些分类）
# 系统会自动初始化默认分类，此列表仅供参考
categories:
  expense:
    - 餐饮
    - 交通
    - 购物
    - 娱乐
    - 居住
    - 医疗
    - 教育
    - 其他支出
  income:
    - 工资
    - 奖金
    - 投资
    - 其他收入
