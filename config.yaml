# Expense Bot 配置文件

bot:
  name: expense_bot
  token: 8700564669:AAFh5K5Qk6s3xhlicDVXQ0cTUV-9aAOI-wI

# 数据库配置
database:
  path: data/expenses.db

# 分类配置
categories:
  expense:
    - 餐饮
    - 交通
    - 购物
    - 娱乐
    - 居住
    - 医疗
    - 教育
    - 其他支出
  income:
    - 工资
    - 奖金
    - 投资
    - 其他收入

# 货币配置
currency:
  name: GBP
  symbol: £

# 安全配置
security:
  allowed_users: []

# 通用设置
settings:
  max_history: 50
  timezone: Europe/London

# AI 配置（用于 PDF 解析等 AI 功能）
ai:
  pdf_parser:
    # 是否启用 AI PDF 解析
    enabled: false
    
    # AI 提供商: openai 或 minimax
    provider: minimax
    
    # API 密钥（从环境变量读取更安全）
    api_key: ""
    
    # 模型名称（可选，默认使用提供商的最佳模型）
    # openai: gpt-4o-mini, gpt-4o, gpt-4
    # minimax: abab6.5s-chat, abab6.5-chat
    model: ""
    
    # API 基础 URL（可选，用于自定义端点或代理）
    # 示例: https://api.openai.com/v1
    # 示例: https://api.minimax.chat/v1
    base_url: ""
